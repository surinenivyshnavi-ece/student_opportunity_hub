name: student_opportunity_hub
description: "Student Opportunity Hub-Find internships,hackathons and teams."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0
  url_launcher: ^6.3.2
  firebase_auth: ^6.5.2
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4+4
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^19.4.0
  http: ^1.2.1
  share_plus: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/icon.png


flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png

  android: true
  ios: true

  android_12:
    color: "#ffffff"
    image: assets/images/logo.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"